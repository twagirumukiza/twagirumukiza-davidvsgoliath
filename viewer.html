<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image viewer — TWAGIRUMUKIZA</title>
  <style>
    :root{--bg:#0b0b0b;--paper:#151515;--ink:#ffffff;--muted:#bfbfbf;--line:rgba(255,255,255,.15)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .wrap{width:min(1200px,94vw);margin:0 auto}
    .top{position:sticky;top:0;background:rgba(11,11,11,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .bar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;padding:16px 0}
    .title{font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.85);background:transparent;color:#fff;font-weight:600;text-decoration:none;cursor:pointer}
    .btn-dark{background:#fff;color:#111}
    .viewer{padding:28px 0 42px}
    figure{margin:0}
    img{display:block;max-width:100%;max-height:78vh;margin:0 auto;border-radius:22px;box-shadow:0 18px 60px rgba(0,0,0,.35)}
    figcaption{text-align:center;color:var(--muted);padding-top:18px;font-size:1rem}
  </style>
</head>
<body>
  <div class="top">
    <div class="wrap bar">
      <div class="title">TWAGIRUMUKIZA — image viewer</div>
      <div class="actions">
        <button class="btn" type="button" id="backButton">← Retour</button>
        <a class="btn btn-dark" id="siteLink" href="index.html">Revenir au site</a>
      </div>
    </div>
  </div>

  <main class="viewer">
    <div class="wrap">
      <figure>
        <img id="mainImage" src="" alt="Artwork image" />
        <figcaption id="caption">Image</figcaption>
      </figure>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src') || 'images/cover.png';
    const caption = params.get('caption') || 'Image';
    const back = params.get('back') || 'index.html';
    const image = document.getElementById('mainImage');
    const captionNode = document.getElementById('caption');
    const siteLink = document.getElementById('siteLink');
    const backButton = document.getElementById('backButton');

    image.src = src;
    image.alt = caption;
    captionNode.textContent = caption;
    siteLink.href = back;

    backButton.addEventListener('click', () => {
      if (window.history.length > 1 && document.referrer) {
        window.history.back();
      } else {
        window.location.href = back;
      }
    });
  </script>
</body>
</html>
